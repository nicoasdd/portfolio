name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          SITE_URL: https://example.github.io
          BASE_PATH: /

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

      - name: Build with HIDE_EXAMPLES=true (smoke)
        run: npm run build
        env:
          SITE_URL: https://example.github.io
          BASE_PATH: /
          HIDE_EXAMPLES: 'true'

      - name: Assert no example projects leak into hidden build
        run: |
          set -euo pipefail
          if compgen -G 'dist/projects/example-*/index.html' > /dev/null; then
            echo "::error::HIDE_EXAMPLES=true build leaked example HTML pages into dist/projects/"
            ls -1 dist/projects/example-*/index.html || true
            exit 1
          fi
          if grep -l 'example-' dist/sitemap-*.xml 2>/dev/null | grep -q .; then
            echo "::error::HIDE_EXAMPLES=true build leaked example URLs into the sitemap"
            grep -n 'example-' dist/sitemap-*.xml
            exit 1
          fi
          if grep -q 'example-' dist/index.html; then
            echo "::error::HIDE_EXAMPLES=true build leaked example references into dist/index.html"
            grep -n 'example-' dist/index.html
            exit 1
          fi
          for cat in personal startup corporate; do
            if grep -q 'example-' "dist/category/$cat/index.html"; then
              echo "::error::HIDE_EXAMPLES=true build leaked example references into dist/category/$cat/index.html"
              grep -n 'example-' "dist/category/$cat/index.html"
              exit 1
            fi
          done
          echo "HIDE_EXAMPLES=true build is clean."

  e2e:
    name: Playwright + axe-core
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          SITE_URL: https://example.github.io
          BASE_PATH: /

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SITE_URL: https://example.github.io
          BASE_PATH: /

      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
