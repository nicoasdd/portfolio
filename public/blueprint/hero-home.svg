<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" role="img" aria-hidden="true" focusable="false">
  <defs>
    <pattern id="bpgrid-home" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="currentColor" stroke-opacity="0.1" stroke-width="1" />
    </pattern>
  </defs>
  <rect x="0" y="0" width="520" height="420" fill="url(#bpgrid-home)" />

  <!-- API label box -->
  <g stroke="currentColor" stroke-width="1.5" fill="none">
    <rect x="330" y="38" width="72" height="28" rx="4" />
    <text x="366" y="57" fill="currentColor" text-anchor="middle" font-family="ui-monospace, SF Mono, Menlo" font-size="13" stroke="none">API</text>
    <line x1="330" y1="66" x2="290" y2="100" stroke-dasharray="3 3" />
  </g>

  <!-- Central cube (server)  isometric -->
  <g stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round">
    <polygon points="240,120 300,90 360,120 300,150" />
    <polygon points="240,120 300,150 300,210 240,180" />
    <polygon points="300,150 360,120 360,180 300,210" />
    <line x1="260" y1="130" x2="340" y2="130" stroke-opacity="0.6" />
    <line x1="260" y1="140" x2="340" y2="140" stroke-opacity="0.6" />
  </g>

  <!-- Cloud -->
  <g stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round">
    <path d="M380 220c0-15 12-26 26-26 4-12 16-20 30-20 18 0 32 13 34 30 14 2 24 14 24 28 0 16-13 28-30 28h-56c-16 0-28-12-28-28 0-5 0-8 0-12z" />
    <text x="420" y="232" fill="currentColor" text-anchor="middle" font-family="ui-monospace, SF Mono, Menlo" font-size="11" stroke="none">CLOUD</text>
  </g>

  <!-- Shield -->
  <g stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round">
    <path d="M430 310 l30 -12 l30 12 v28 c0 20 -14 32 -30 38 -16 -6 -30 -18 -30 -38 z" />
    <path d="M448 330 l8 8 l16 -16" />
  </g>

  <!-- Database cylinders -->
  <g stroke="currentColor" stroke-width="1.5" fill="none">
    <ellipse cx="120" cy="250" rx="40" ry="10" />
    <path d="M80 250 v50 c0 6 18 10 40 10 s40 -4 40 -10 v-50" />
    <path d="M80 275 c0 6 18 10 40 10 s40 -4 40 -10" />
    <text x="120" y="330" fill="currentColor" text-anchor="middle" font-family="ui-monospace, SF Mono, Menlo" font-size="11" stroke="none">DB</text>
  </g>

  <!-- Code snippet panel -->
  <g stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round">
    <rect x="60" y="120" width="150" height="80" rx="6" />
    <text x="75" y="142" fill="currentColor" font-family="ui-monospace, SF Mono, Menlo" font-size="10" stroke="none">{</text>
    <text x="88" y="158" fill="currentColor" font-family="ui-monospace, SF Mono, Menlo" font-size="10" stroke="none">"status": "success",</text>
    <text x="88" y="174" fill="currentColor" font-family="ui-monospace, SF Mono, Menlo" font-size="10" stroke="none">"data": [ ... ]</text>
    <text x="75" y="190" fill="currentColor" font-family="ui-monospace, SF Mono, Menlo" font-size="10" stroke="none">}</text>
  </g>

  <!-- Connection arrows -->
  <g stroke="currentColor" stroke-width="1.2" fill="none" stroke-dasharray="3 3">
    <line x1="210" y1="160" x2="240" y2="160" />
    <line x1="360" y1="170" x2="400" y2="210" />
    <line x1="300" y1="210" x2="450" y2="300" />
    <line x1="160" y1="260" x2="240" y2="190" />
  </g>
</svg>
