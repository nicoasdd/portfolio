<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-hidden="true" focusable="false">
  <defs>
    <pattern id="bpgrid-cat" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="currentColor" stroke-opacity="0.1" stroke-width="1" />
    </pattern>
  </defs>
  <rect x="0" y="0" width="520" height="360" fill="url(#bpgrid-cat)" />

  <!-- Independent builder callout card -->
  <g stroke="currentColor" stroke-width="1.5" fill="none">
    <rect x="300" y="60" width="200" height="150" rx="6" />
    <text x="320" y="82" fill="currentColor" font-family="ui-monospace, SF Mono, Menlo" font-size="12" stroke="none">INDEPENDENT BUILDER</text>
    <line x1="320" y1="92" x2="420" y2="92" stroke-dasharray="3 3" />
    <text x="320" y="112" fill="currentColor" font-family="Inter, system-ui" font-size="12" stroke="none"> Idea ’ Build ’ Ship</text>
    <text x="320" y="135" fill="currentColor" font-family="Inter, system-ui" font-size="12" stroke="none"> Operate + Iterate</text>
    <text x="320" y="158" fill="currentColor" font-family="Inter, system-ui" font-size="12" stroke="none"> Own the outcome</text>
  </g>

  <!-- Builder figure: simplified person with laptop (isometric cubes) -->
  <g stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round">
    <circle cx="140" cy="130" r="24" />
    <path d="M100 190 c0 -25 20 -40 40 -40 s40 15 40 40" />
    <rect x="70" y="220" width="140" height="60" rx="4" />
    <line x1="70" y1="240" x2="210" y2="240" />
    <!-- Isometric cubes scattered around -->
    <polygon points="60,60 90,48 120,60 90,72" />
    <polygon points="60,60 90,72 90,105 60,93" />
    <polygon points="90,72 120,60 120,93 90,105" />
    <polygon points="240,80 270,68 300,80 270,92" />
    <polygon points="240,80 270,92 270,120 240,108" />
    <polygon points="270,92 300,80 300,110 270,120" />
    <polygon points="380,260 410,248 440,260 410,272" />
    <polygon points="380,260 410,272 410,300 380,288" />
    <polygon points="410,272 440,260 440,290 410,300" />
  </g>

  <!-- Connection dots -->
  <g stroke="currentColor" stroke-width="1.2" fill="none" stroke-dasharray="3 3">
    <line x1="180" y1="170" x2="290" y2="110" />
    <line x1="210" y1="250" x2="300" y2="220" />
  </g>
</svg>
